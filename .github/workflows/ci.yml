name: MkDocs CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install -r scripts/requirements-analytics.txt
      - name: GA4 stats JSON (no secrets on fork PRs → placeholder)
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: python scripts/fetch_ga_stats.py
      - run: mkdocs build --strict

  link_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: --verbose --no-progress docs/ README.md CONTRIBUTING.md
