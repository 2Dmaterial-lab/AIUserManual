name: Deploy MkDocs Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'scripts/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'README.md'
      - '.github/workflows/deploy.yml'
  # 手动在 Actions 里点「Run workflow」也会跑一遍，用于只刷新页脚累计数而不改文档
  workflow_dispatch:
  # 页脚 JSON 只在「部署构建」时从 GA 拉取；访问网站不会更新文件。每天自动部署一次以同步累计浏览量。
  schedule:
    - cron: '40 2 * * *'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # GA4 网页统计（gtag）
      GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install -r scripts/requirements-analytics.txt
      - name: Pull GA4 total page views for footer
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: python scripts/fetch_ga_stats.py
      - run: mkdocs build --strict
      - run: mkdocs gh-deploy --force
