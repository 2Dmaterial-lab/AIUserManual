site_name: AI辅助科研工具使用说明
site_description: 面向课题组研究生的AI辅助环境配置与工具使用指南
site_author: 2Dmaterial-lab
site_url: https://2dmaterial-lab.github.io/AIUserManual/

repo_url: https://github.com/2dmaterial-lab/AIUserManual
edit_uri: edit/main/docs/

# 主题配置
theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式

# 导航结构
nav:
  - 首页: index.md
  - 基础篇:
    - 前言: 00-introduction.md
    - AI工具总览: 01-ai-tools-guide.md
  - 工具指南:
    - Origin: 02-origin.md
    - MATLAB: 03-matlab.md
    - Excel: 04-excel.md
    - COMSOL: 05-comsol.md
    - FDTD: 06-fdtd.md
    - SolidWorks: 07-solidworks.md
    - C4D: 08-c4d.md
    - LabVIEW: 09-labview.md
  - 科研工作流:
    - 科研任务工作流: 12-research-workflows.md
    - 数据管理与可复现科研: 13-data-reproducibility.md
    - 入组第一周训练: 14-new-student-bootcamp.md
  - 提示词模板: 10-prompt-templates.md
  - 附录:
    - 课题组信息与本地约定: 11-lab-info.md
    - 更新日志: changelog.md

# Markdown 扩展
markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - footnotes
  - meta
  - toc:
      permalink: true
  - tables
  - pymdownx.betterem

# 搜索与插件
plugins:
  - search:
      lang:
        - zh
        - en
  - redirects:
      redirect_maps: {}

extra:
  generator: false
  copyright: Copyright &copy; 2025–2026 2Dmaterial-lab
  # 浏览量：在 Google Analytics 4 创建数据流，取得 G- 开头的衡量 ID；
  # 本地可 export GOOGLE_ANALYTICS_ID=G-xxxx；GitHub Actions 见仓库 Settings → Secrets → GOOGLE_ANALYTICS_ID
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_ID, ""]

# 使用方法：
# 1. pip install -r requirements.txt
# 2. 本地预览: mkdocs serve
# 3. 构建站点: mkdocs build
# 4. 部署到 GitHub Pages: mkdocs gh-deploy
